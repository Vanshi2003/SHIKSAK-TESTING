name: Run Selenium Integration Tests

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: 'Jira Issue Key'
        required: true
        default: 'VINT-8'
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest selenium jira

    - name: Setup Chrome Headless
      uses: browser-actions/setup-chrome@v1

    - name: Execute Selenium Automation Suite
      env:
        JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        ISSUE_KEY: ${{ github.event.inputs.issue_key }}
      run: |
        pytest vint_sit_01.py -v
